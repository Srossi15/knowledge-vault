<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Vault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .quiz-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 2rem;
    }

    .progress-bar {
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.3s ease;
    }

    .question-text {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .option {
      padding: 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 1rem;
    }

    .option:hover {
      border-color: #667eea;
      background: #f3f4f6;
    }

    .option.selected {
      border-color: #667eea;
      background: #ede9fe;
    }

    .option.correct {
      border-color: #10b981;
      background: #d1fae5;
    }

    .option.incorrect {
      border-color: #ef4444;
      background: #fee2e2;
    }

    .confidence-selector {
      margin-bottom: 2rem;
    }

    .confidence-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 0.75rem;
    }

    .confidence-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .confidence-btn {
      flex: 1;
      padding: 0.5rem;
      border: 2px solid #e5e7eb;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .confidence-btn:hover {
      border-color: #667eea;
    }

    .confidence-btn.selected {
      border-color: #667eea;
      background: #667eea;
      color: white;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #e5e7eb;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      font-size: 0.875rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }

    .feedback {
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .feedback.correct {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .feedback.incorrect {
      background: #fee2e2;
      color: #7f1d1d;
      border: 1px solid #fca5a5;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #9ca3af;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <!-- Header -->
    <div class="card mb-4">
      <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold text-gray-900">Knowledge Vault</h1>
        <button onclick="toggleStats()" class="text-sm font-medium text-purple-600 hover:text-purple-700">
          Stats
        </button>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
      </div>
    </div>

    <!-- Main Quiz Card -->
    <div class="card" id="quizCard">
      <!-- Loading State -->
      <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <p class="mt-4">Loading your quiz...</p>
      </div>

      <!-- Quiz State -->
      <div id="quizState" style="display: none;">
        <div class="mb-2">
          <span class="text-sm font-medium text-gray-500" id="articleType"></span>
          <h2 class="text-sm text-gray-700 font-medium" id="articleTitle"></h2>
        </div>

        <div class="question-text" id="questionText"></div>

        <div class="options" id="optionsContainer"></div>

        <!-- Confidence Selector -->
        <div class="confidence-selector">
          <label class="confidence-label">How confident are you?</label>
          <div class="confidence-buttons">
            <button class="confidence-btn" onclick="setConfidence(1)" data-confidence="1">1 (Guessing)</button>
            <button class="confidence-btn" onclick="setConfidence(2)" data-confidence="2">2</button>
            <button class="confidence-btn" onclick="setConfidence(3)" data-confidence="3">3 (Medium)</button>
            <button class="confidence-btn" onclick="setConfidence(4)" data-confidence="4">4</button>
            <button class="confidence-btn" onclick="setConfidence(5)" data-confidence="5">5 (Certain)</button>
          </div>
        </div>

        <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>
          Submit Answer
        </button>

        <!-- Feedback -->
        <div id="feedback"></div>
      </div>
    </div>

    <!-- Stats Modal -->
    <div id="statsModal" style="display: none;" class="card mt-4">
      <h3 class="text-lg font-bold mb-4 text-gray-900">Your Progress</h3>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="accuracyStat">0%</div>
          <div class="stat-label">Accuracy</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="streakStat">0</div>
          <div class="stat-label">Current Streak</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="answeredStat">0</div>
          <div class="stat-label">Questions Answered</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="correctStat">0</div>
          <div class="stat-label">Correct</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
